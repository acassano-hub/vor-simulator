<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VOR / HSI</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background:#0c0d11;
      color:#cdd0d8;
      font-family:-apple-system,'Helvetica Neue',sans-serif;
      width:100vw; height:100vh;
      overflow:hidden;
    }

    /* ══════════════════════════════
       LAYOUT LANDSCAPE (siempre)
    ══════════════════════════════ */
    .screen {
      width:100%; height:100%;
      display:flex;
      flex-direction:row;
      align-items:stretch;
      overflow:hidden;
    }

    /* ── Panel central ── */
    .center-panel {
      flex:1; min-width:0;
      display:flex; flex-direction:column;
      align-items:center;
      overflow:hidden;
      padding:0 2px;
    }

    /* ── Paneles laterales — columna vertical ── */
    .side-panel {
      width:155px; flex-shrink:0;
      display:flex; flex-direction:column;
      align-items:stretch;
      padding:6px; gap:5px;
    }
    .side-obs { padding-left:max(6px, env(safe-area-inset-left)); }
    .side-hdg { padding-right:max(6px, env(safe-area-inset-right)); }

    /* Encabezado (label + valor + TO/FROM) — fuera del rectángulo */
    .ctrl-header {
      flex-shrink:0;
      display:flex; flex-direction:column;
      align-items:center; gap:1px;
    }

    /* Grupo: solo botones flecha apilados */
    .ctrl-group {
      flex:1; min-height:0;
      background:#111318;
      border:1px solid #2a2d38;
      border-radius:12px;
      padding:5px; gap:5px;
      display:flex; flex-direction:column;
    }
    .ctrl-group-obs { border-color:#f0c040; border-width:2px; }

    .ctrl-tag {
      font-size:26px; font-weight:700;
      font-family:'Courier New',monospace;
      letter-spacing:1px;
    }
    .side-obs .ctrl-tag { color:#f0c040; }
    .side-hdg .ctrl-tag { color:#00e5ff; }
    #obs-display {
      font-size:52px; color:#f0c040;
      font-weight:700;
      font-family:'Courier New',monospace;
      line-height:1;
    }
    #hdg-display {
      font-size:52px; color:#00e5ff;
      font-weight:700;
      font-family:'Courier New',monospace;
      line-height:1;
    }
    /* Botones flecha */
    .ctrl-btn {
      flex:1; min-height:0;
      background:#171920; border:1px solid #22242c;
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      user-select:none; -webkit-user-select:none;
    }
    .ctrl-btn:active { background:#1e2028; }
    .ctrl-btn-arrow    { font-size:40px; font-family:'Courier New',monospace; }
    .ctrl-btn-arrow-1  { color:#aaa; }
    .ctrl-btn-arrow-10 { color:transparent; -webkit-text-stroke:2px #ccc; }

    /* Botón +180 — fuera del rectángulo */
    .ctrl-btn-180 {
      width:100%; flex-shrink:0;
      background:#ffffff; color:#000;
      font-weight:700; font-size:26px;
      border:1px solid #fff; border-radius:8px;
      padding:5px 0; text-align:center;
      cursor:pointer;
      user-select:none; -webkit-user-select:none;
      font-family:'Courier New',monospace;
    }
    .ctrl-btn-180:active { background:#e0e0e0; }

    /* ── TOP BAR ── */
    .top-bar {
      width:100%; flex-shrink:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:1px 6px 0;
    }
    .btn-settings {
      background:none; border:none;
      color:#5a8acc; font-size:28px; line-height:1;
      cursor:pointer; padding:2px 4px; border-radius:6px;
    }
    #gps-top { display:none; }
    #gps-top.on { display:none; }

    /* ── HSI container (crece para llenar espacio) ── */
    .hsi-container {
      flex:1; min-height:0;
      width:100%;
      display:flex; align-items:center; justify-content:center;
    }
    #hsi { display:block; width:100%; height:100%; max-width:100%; max-height:100%; }

    /* ── Info-bar: 2 columnas, label arriba + número abajo ── */
    .info-bar {
      width:100%; flex-shrink:0;
      display:flex; flex-direction:row;
      align-items:flex-end; justify-content:space-between;
      padding:0 4px 0;
    }
    .info-col   { display:flex; flex-direction:column; align-items:flex-start; flex-shrink:0; }
    .info-col-r { align-items:flex-end; }
    .info-numrow { display:flex; align-items:baseline; gap:4px; }
    #vor-badge {
      font-size:20px; color:#f0c040; font-weight:700;
      font-family:'Courier New',monospace; letter-spacing:1px; line-height:1;
    }
    .info-r-label {
      font-size:20px; color:#ffffff; font-weight:700;
      font-family:'Courier New',monospace; letter-spacing:1px; line-height:1;
    }
    #dme-val    { font-size:40px; font-family:'Courier New',monospace; color:#ff5555; font-weight:700; line-height:1; }
    .dme-nm     { font-size:16px; color:#fff; font-family:'Courier New',monospace; }
    #radial-val { font-size:32px; font-family:'Courier New',monospace; color:#fff; font-weight:700; line-height:1; }
    #tofrom-text {
      font-size:22px; font-weight:700; line-height:1;
      font-family:'Courier New',monospace;
      color:#333; letter-spacing:1px;
    }

    /* ════ SETTINGS SCREEN ════ */
    .settings-header {
      width:100%; display:flex; align-items:center; gap:10px;
      padding:10px 14px; border-bottom:1px solid #18191f;
    }
    .btn-back {
      background:none; border:none; color:#5a8acc;
      font-size:38px; cursor:pointer;
      padding:6px 10px 6px 0;
      display:flex; align-items:center; gap:5px;
    }
    .settings-title {
      font-size:28px; color:#777; letter-spacing:2px;
      font-family:'Courier New',monospace;
    }
    .settings-gps-fixed {
      width:100%; padding:10px 14px;
      border-bottom:1px solid #18191f; flex-shrink:0;
    }
    .settings-body {
      width:100%; padding:14px;
      display:flex; flex-direction:column; gap:18px;
      overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1;
    }
    .s-label {
      font-size:20px; color:#888; letter-spacing:2px;
      text-transform:uppercase; margin-bottom:8px;
      font-family:'Courier New',monospace;
    }
    .vor-cards { display:flex; flex-direction:column; gap:8px; }
    .vor-card {
      display:flex; align-items:center;
      padding:14px 16px; background:#141618;
      border:1px solid #202228; border-radius:12px;
      cursor:pointer; gap:12px;
    }
    .vor-card.active { background:#0b1e38; border-color:#2a5590; }
    .vor-card-dot { width:9px; height:9px; border-radius:50%; background:#252830; flex-shrink:0; }
    .vor-card.active .vor-card-dot { background:#3ac060; }
    .vor-card-main { flex:1; }
    .vor-card-id { font-size:40px; font-weight:700; font-family:'Courier New',monospace; color:#cdd0d8; letter-spacing:2px; }
    .vor-card.active .vor-card-id { color:#7eb8f7; }
    .vor-card-name { font-size:24px; color:#888; margin-top:1px; }
    .vor-card-right { text-align:right; }
    .vor-card-magvar { font-size:26px; font-family:'Courier New',monospace; color:#f0c040; }
    .magvar-section { display:flex; flex-direction:column; gap:8px; }
    .magvar-title { font-size:20px; color:#888; letter-spacing:2px; text-transform:uppercase; font-family:'Courier New',monospace; }
    .magvar-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; background:#141618;
      border:1px solid #202228; border-radius:12px; gap:10px;
    }
    .magvar-label { font-size:28px; color:#ccc; white-space:nowrap; }
    #magvar-input {
      width:210px; background:#0c0e12; border:1px solid #2d3038;
      color:#f0c040; padding:8px 10px; border-radius:8px;
      font-size:42px; font-family:'Courier New',monospace; text-align:center;
    }
    #gps-btn-settings {
      padding:13px; background:#0d2a14; border:1px solid #1a4a22;
      color:#4fd870; border-radius:10px; font-size:28px;
      cursor:pointer; text-align:center; letter-spacing:.5px;
    }
    #gps-btn-settings.on { background:#081a0c; border-color:#2a7a36; color:#38c057; }
    #gps-coords-settings { font-size:22px; color:#555; font-family:'Courier New',monospace; text-align:center; }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
//  NAV AIDS DATABASE
// ═══════════════════════════════════════════════════════════
const NAVAIDS = {
  PAR: { name:'Paraná',  lat:-31.80833, lon:-60.48472, freq:'116.8', magVarDefault:-9.55 },
  SVO: { name:'Sauce V', lat:-31.71144, lon:-60.80639, freq:'NDB',   magVarDefault:-9.55 },
  ROS: { name:'Rosario', lat:-32.90500, lon:-60.78138, freq:'117.3', magVarDefault:-9.55 },
  CBA: { name:'Córdoba', lat:-31.31333, lon:-64.20362, freq:'114.5', magVarDefault:-7.40 }
};

function getMagVar(id) {
  const stored = localStorage.getItem('magVar_' + id);
  return stored !== null ? parseFloat(stored) : NAVAIDS[id].magVarDefault;
}

function saveMagVar(val) {
  if (isNaN(val)) return;
  S.magVar = val;
  localStorage.setItem('magVar_' + S.selectedVOR, val);
  update();
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S = {
  acLat:null, acLon:null,
  gpsTrack:null, gpsSpeed:0, gpsAcc:null,
  gpsActive:false, watchId:null,
  selectedVOR:'PAR', obs:0, hdgBug:0,
  magVar: getMagVar('PAR')
};

// ═══════════════════════════════════════════════════════════
//  MATH
// ═══════════════════════════════════════════════════════════
const toRad     = d => d * Math.PI / 180;
const toDeg     = r => r * 180 / Math.PI;
const norm360   = d => ((d % 360) + 360) % 360;
const normPM180 = d => { d = norm360(d); return d > 180 ? d - 360 : d; };

function bearing(la1, lo1, la2, lo2) {
  const φ1=toRad(la1), φ2=toRad(la2), Δλ=toRad(lo2-lo1);
  return norm360(toDeg(Math.atan2(
    Math.sin(Δλ)*Math.cos(φ2),
    Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ)
  )));
}

function distNm(la1, lo1, la2, lo2) {
  const R=3440.065;
  const φ1=toRad(la1), φ2=toRad(la2);
  const Δφ=toRad(la2-la1), Δλ=toRad(lo2-lo1);
  const a=Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function calcCDI(magRadial, obs) {
  const brgToVOR = norm360(magRadial + 180);
  const toDev    = normPM180(brgToVOR - obs);
  const fromDev  = normPM180(magRadial - obs);
  const F = 10;
  if (Math.abs(toDev) < 87) return { flag:'TO',   frac: clamp( toDev/F) };
  if (Math.abs(toDev) > 93) return { flag:'FROM', frac: clamp(-fromDev/F) };
  return { flag:'OFF', frac:0 };
}
const clamp = v => Math.max(-1, Math.min(1, v));

// ═══════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════
function update() {
  const vor    = NAVAIDS[S.selectedVOR];
  const magVar = S.magVar;

  const useTrack   = S.acLat !== null && S.gpsTrack !== null && S.gpsSpeed > 0.5;
  const magHeading = useTrack ? norm360(S.gpsTrack - magVar) : 0;

  $('g-compass').setAttribute('transform', `rotate(${-magHeading},150,150)`);
  $('g-course') .setAttribute('transform', `rotate(${norm360(S.obs-magHeading)},150,150)`);
  $('g-hdg-bug').setAttribute('transform', `rotate(${norm360(S.hdgBug-magHeading)},150,150)`);
  $('hdg-text').textContent = useTrack ? pad3(Math.round(magHeading))+'°' : 'N↑';

  if (S.acLat === null) return;

  const trueRadial = bearing(vor.lat, vor.lon, S.acLat, S.acLon);
  const magRadial  = norm360(trueRadial - magVar);
  const brgToVOR   = norm360(magRadial + 180);
  const dist       = distNm(S.acLat, S.acLon, vor.lat, vor.lon);

  const { flag, frac } = calcCDI(Math.round(magRadial), S.obs);
  const nx = 150 + frac * 55;
  $('cdi-needle').setAttribute('x1', nx);
  $('cdi-needle').setAttribute('x2', nx);

  const tf = $('tofrom-text');
  tf.textContent = (flag === 'OFF') ? '---' : flag;
  tf.style.color = (flag==='TO'||flag==='FROM') ? '#f0c040' : '#333';

  $('g-rmi').setAttribute('transform', `rotate(${norm360(brgToVOR-magHeading)},150,150)`);
  $('dme-val')   .textContent = dist.toFixed(1);
  $('radial-val').textContent = pad3(Math.round(magRadial));
}

// ═══════════════════════════════════════════════════════════
//  COMPASS ROSE
// ═══════════════════════════════════════════════════════════
function drawCompassRose() {
  const g = $('g-compass');
  const CX=150, CY=150, R=130;
  const LABELS = {
    0:'N', 30:'03', 60:'06', 90:'E',
    120:'12', 150:'15', 180:'S',
    210:'21', 240:'24', 270:'W', 300:'30', 330:'33'
  };
  const CARD = new Set([0,90,180,270]);

  for (let deg=0; deg<360; deg+=5) {
    const isMaj = deg%30===0;
    const isMed = deg%10===0 && !isMaj;
    const tLen  = isMaj ? 15 : isMed ? 10 : 5;
    const color = isMaj ? '#c0c4cc' : isMed ? '#e8ecf4' : '#282c34';
    const sw    = isMaj ? 3 : 1;
    const rad   = toRad(deg-90);
    const x1=CX+R*Math.cos(rad),        y1=CY+R*Math.sin(rad);
    const x2=CX+(R-tLen)*Math.cos(rad), y2=CY+(R-tLen)*Math.sin(rad);

    const ln = svgEl('line');
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.setAttribute('stroke',color); ln.setAttribute('stroke-width',sw);
    g.appendChild(ln);

    if (isMaj) {
      const tR = R - 42;
      const tx=CX+tR*Math.cos(rad), ty=CY+tR*Math.sin(rad);
      const isC = CARD.has(deg);
      const t = svgEl('text');
      t.setAttribute('x',tx); t.setAttribute('y',ty);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size', isC ? '26' : '20');
      t.setAttribute('font-weight', isC ? '700' : '500');
      t.setAttribute('fill','#e8ecf4');
      t.setAttribute('font-family',"'Courier New',monospace");
      t.textContent = LABELS[deg];
      g.appendChild(t);
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  CONTROLES
// ═══════════════════════════════════════════════════════════
function changeOBS(delta) {
  S.obs = norm360(S.obs + delta);
  $('obs-display').textContent = pad3(S.obs)+'°';
  update();
}

function changeHDG(delta) {
  S.hdgBug = norm360(S.hdgBug + delta);
  $('hdg-display').textContent = pad3(S.hdgBug)+'°';
  update();
}

// ═══════════════════════════════════════════════════════════
//  PANTALLAS
// ═══════════════════════════════════════════════════════════
function showSettings() {
  $('screen-main').style.display = 'none';
  $('screen-settings').style.display = 'flex';
  renderNAVCards();
}

function showMain() {
  $('screen-settings').style.display = 'none';
  $('screen-main').style.display = 'flex';
  update();
}

function renderNAVCards() {
  const c = $('vor-cards');
  c.innerHTML = '';
  Object.entries(NAVAIDS).forEach(([id, v]) => {
    const mv = getMagVar(id);
    const card = document.createElement('div');
    card.className = 'vor-card'+(id===S.selectedVOR?' active':'');
    card.innerHTML = `
      <div class="vor-card-dot"></div>
      <div class="vor-card-main">
        <div class="vor-card-id">${id}</div>
        <div class="vor-card-name">${v.name}</div>
      </div>
      <div class="vor-card-right">
        <div class="vor-card-magvar">${mv > 0 ? '+' : ''}${mv}°</div>
      </div>`;
    card.onclick = () => {
      S.selectedVOR = id;
      S.magVar = getMagVar(id);
      $('vor-badge').textContent = id;
      $('magvar-input').value = S.magVar;
      $('magvar-navid').textContent = id;
      renderNAVCards();
      update();
    };
    c.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
//  GPS
// ═══════════════════════════════════════════════════════════
function toggleGPS() { S.gpsActive ? stopGPS() : startGPS(); }

function startGPS() {
  if (!navigator.geolocation) { setGPSMsg('GPS no disponible'); return; }
  setGPSMsg('Solicitando…');
  $('gps-btn-settings').textContent = '⏳  Conectando…';
  if (S.watchId!==null) navigator.geolocation.clearWatch(S.watchId);

  S.watchId = navigator.geolocation.watchPosition(
    pos => {
      S.acLat    = pos.coords.latitude;
      S.acLon    = pos.coords.longitude;
      S.gpsSpeed = pos.coords.speed   || 0;
      S.gpsTrack = pos.coords.heading;
      S.gpsAcc   = pos.coords.accuracy;
      S.gpsActive = true;

      const acc = `±${Math.round(S.gpsAcc)}m`;
      $('gps-top').textContent = `GPS  ${acc}`;
      $('gps-top').className   = 'on';
      $('gps-btn-settings').textContent = '■  Detener GPS';
      $('gps-btn-settings').className   = 'on';

      const coord = `${S.acLat.toFixed(5)}°  ${S.acLon.toFixed(5)}°`;
      $('gps-coords-settings').textContent = coord;
      update();
    },
    err => {
      setGPSMsg(`Error: ${err.message}`);
      $('gps-btn-settings').textContent = '↺  Reintentar';
      $('gps-btn-settings').className   = '';
      $('gps-top').className = '';
      S.gpsActive = false;
    },
    { enableHighAccuracy:true, maximumAge:4000, timeout:20000 }
  );
}

function stopGPS() {
  if (S.watchId!==null) { navigator.geolocation.clearWatch(S.watchId); S.watchId=null; }
  S.gpsActive = false;
  $('gps-btn-settings').textContent = '▶  Iniciar GPS';
  $('gps-btn-settings').className   = '';
  $('gps-top').textContent = 'GPS inactivo';
  $('gps-top').className   = '';
}

function setGPSMsg(m) { $('gps-top').textContent = m; }

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
const $     = id  => document.getElementById(id);
const svgEl = tag => document.createElementNS('http://www.w3.org/2000/svg', tag);
const pad3  = n   => String(n).padStart(3,'0');

// ═══════════════════════════════════════════════════════════
//  WAKE LOCK
// ═══════════════════════════════════════════════════════════
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => setTimeout(requestWakeLock, 1000));
  } catch(e) {}
}
document.addEventListener('touchstart', requestWakeLock, { once:true });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
setInterval(() => { if (!wakeLock || wakeLock.released) requestWakeLock(); }, 30000);

// ═══════════════════════════════════════════════════════════
//  AUTO-UPDATE
// ═══════════════════════════════════════════════════════════
let _lastEtag = null;
async function checkForUpdate() {
  if (!navigator.onLine) return;
  try {
    const r = await fetch(location.href, { method:'HEAD', cache:'no-store' });
    const tag = r.headers.get('etag') || r.headers.get('last-modified');
    if (!tag) return;
    if (_lastEtag && tag !== _lastEtag) { location.reload(true); return; }
    _lastEtag = tag;
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkForUpdate();
});
setInterval(checkForUpdate, 60000);
checkForUpdate();

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
drawCompassRose();
$('magvar-input').value = S.magVar;
$('magvar-navid').textContent = S.selectedVOR;
requestWakeLock();
</script>
